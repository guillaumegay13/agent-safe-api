# agent-safe-api — service registry.  Copy to services.conf and edit.
# Format (pipe-delimited):
#   name | base_url | auth | secret_spec | [test_method] | [test_path]
#
#   auth=bearer     secret_spec = TOKEN_ENVVAR
#   auth=basic      secret_spec = LOGIN_ENVVAR:PASSWORD_ENVVAR
#   auth=token-cmd  secret_spec = ENVVAR_HOLDING_A_COMMAND_THAT_PRINTS_A_TOKEN
#   auth=none       secret_spec = -
#
# The last two fields are optional and only used by `api.sh probe`.
# Secret values themselves live in secrets.env (never here, never committed).

# Works out of the box with no secrets — proves the wrapper runs:
github       | https://api.github.com              | none      | -                              | GET | rate_limit

# --- examples of each auth style (uncomment + adapt) ------------------------

# bearer token from an env var:
# openai     | https://api.openai.com/v1           | bearer    | OPENAI_API_KEY                 | GET | models

# HTTP basic (login:password from two env vars):
# someapi    | https://api.example.com/v3          | basic     | SOMEAPI_LOGIN:SOMEAPI_PASSWORD | GET | account

# token minted on demand by a command (e.g. a cloud CLI) — the command string
# lives in an env var; api.sh runs it via $(...) and never prints the token:
# gcp_api    | https://example.googleapis.com      | token-cmd | GCP_TOKEN_CMD                  | GET | v1/ping
